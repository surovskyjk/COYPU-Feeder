<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<style>
  html, body, #map { width:100%; height:100%; margin:0; padding:0; background:#1a1a1a; }
  .aln-tip {
    background: rgba(30,30,30,0.92);
    color: #f0f0f0;
    border: 1px solid #555;
    border-radius: 4px;
    font-family: "Segoe UI", "Helvetica Neue", sans-serif;
    font-size: 11px;
    padding: 6px 8px;
    line-height: 1.4;
  }
  .aln-tip b { color: #ffd54f; }
</style>
<link rel="stylesheet" href="leaflet.css"/>
<script src="leaflet.js"></script>
<script src="qrc:///qtwebchannel/qwebchannel.js"></script>
</head>
<body>
<div id="map"></div>
<script>
"use strict";
var map = L.map('map', {zoomControl: true}).setView([50.05, 14.42], 7);

/* Custom panes for z-ordering */
map.createPane('tracksPane').style.zIndex      = '410';
map.createPane('piPane').style.zIndex          = '615';
map.createPane('osmRefPane').style.zIndex      = '630';
map.createPane('candidatesPane').style.zIndex  = '620';
map.createPane('alignmentGlowPane').style.zIndex = '640';
map.createPane('alignmentPane').style.zIndex   = '650';
map.createPane('crossSectionPane').style.zIndex = '625';
map.createPane('stationPane').style.zIndex     = '660';

/* Canvas renderers for the alignment: a long line has hundreds of elements,
   and one SVG path per element makes pan/zoom crawl. Canvas draws them all
   into a single element while keeping mouse events and tooltips working. */
var _alnRenderer  = L.canvas({ pane: 'alignmentPane',     padding: 0.5 });
var _glowRenderer = L.canvas({ pane: 'alignmentGlowPane', padding: 0.5 });

var baseLayer       = null;
var railOverlay     = null;
var trackLayers     = [];
var osmRefLayers    = [];
var alignmentLayers = [];
var candidateLayers = [];
var candIndex       = {};    // algo_id → [glow, main] (card-hover emphasis)
var segIndex        = {};    // element_id → {main, glow, pts, col, selected}
var piLayers        = [];    // PI markers + dashed virtual tangents
var stationLayers   = [];    // station markers
var csLeftLayer     = null;
var csRightLayer    = null;
var backend         = null;
var _showRailOverlay = true;
var _hoverTimer     = null;
var _hoverPopup     = null;
var _stationClickMode = false;

/* ── Tile provider ─────────────────────────────────────────────── */
function setTileProvider(url, subs, attr, maxZoom) {
  if (baseLayer) { map.removeLayer(baseLayer); baseLayer = null; }
  var opts = { attribution: attr, maxZoom: maxZoom || 19 };
  if (subs) opts.subdomains = subs;
  baseLayer = L.tileLayer(url, opts).addTo(map);
  /* Keep rail overlay on top if active */
  if (railOverlay) railOverlay.bringToFront();
}

/* ── OpenRailwayMap overlay ────────────────────────────────────── */
function setRailOverlay(show) {
  _showRailOverlay = show;
  if (show) {
    if (!railOverlay) {
      railOverlay = L.tileLayer(
        'https://{s}.tiles.openrailwaymap.org/standard/{z}/{x}/{y}.png',
        { subdomains:'abc', maxZoom:19, opacity:0.8,
          attribution:'© <a href="https://www.openrailwaymap.org/">OpenRailwayMap</a>' }
      ).addTo(map);
    }
  } else {
    if (railOverlay) { map.removeLayer(railOverlay); railOverlay = null; }
  }
}

/* Load default tiles immediately */
setTileProvider(
  'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
  '', '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors', 19
);
setRailOverlay(true);

/* ── QWebChannel bootstrap ──────────────────────────────────────  */
new QWebChannel(qt.webChannelTransport, function(channel) {
  backend = channel.objects.backend;
  backend.on_ready();
});

/* ── Map bounds ─────────────────────────────────────────────────  */
function getMapBounds() {
  var b = map.getBounds();
  backend.on_bounds_ready(b.getSouth(), b.getWest(), b.getNorth(), b.getEast());
}

/* ── Track display ──────────────────────────────────────────────  */
function showTracks(tracks) {
  trackLayers.forEach(function(l) { map.removeLayer(l); });
  trackLayers = [];
  var all = [];
  tracks.forEach(function(t) {
    var color   = t.color || '#4fc3f7';
    var latlngs = t.nodes.map(function(n) { return [n[0], n[1]]; });
    if (!latlngs.length) return;
    all = all.concat(latlngs);
    var pl = L.polyline(latlngs, {color:color, weight:4, opacity:0.9, pane:'tracksPane'});
    pl._baseColor = color;
    pl.addTo(map);
    trackLayers.push(pl);
  });
  if (all.length)
    try { map.fitBounds(L.latLngBounds(all), {padding:[20,20], maxZoom:14}); } catch(e){}
}

function highlightTrack(idx) {
  trackLayers.forEach(function(l, i) {
    var base = l._baseColor || '#4fc3f7';
    if (idx < 0)       l.setStyle({color:base,    weight:4, opacity:0.9});
    else if (i===idx) { l.setStyle({color:'#ffeb3b', weight:7, opacity:1.0}); l.bringToFront(); }
    else               l.setStyle({color:base,    weight:2, opacity:0.25});
  });
}

function flyToTracks() {
  var all = [];
  trackLayers.forEach(function(l){ all = all.concat(l.getLatLngs()); });
  if (all.length)
    try { map.flyToBounds(L.latLngBounds(all), {padding:[30,30], duration:0.8, maxZoom:14}); } catch(e){}
}

/* ── OSM reference overlay (dashed cyan) ────────────────────────  */
function showOSMReference(alns) {
  clearOSMReference();
  alns.forEach(function(aln) {
    var latlngs = aln.nodes.map(function(n){ return [n[0],n[1]]; });
    if (latlngs.length < 2) return;
    var pl = L.polyline(latlngs, {
      color: '#00e5ff', weight: 3, opacity: 0.85,
      dashArray: '8 6', pane: 'osmRefPane'
    }).addTo(map);
    osmRefLayers.push(pl);
  });
}

function clearOSMReference() {
  osmRefLayers.forEach(function(l){ try{ map.removeLayer(l); }catch(e){} });
  osmRefLayers = [];
}

/* ── Fitted alignment overlay (solid red) ───────────────────────  */
function showAlignment(alns) {
  clearAlignment();
  var all = [];
  alns.forEach(function(aln) {
    var latlngs = aln.nodes.map(function(n){ return [n[0],n[1]]; });
    if (latlngs.length < 2) return;
    all = all.concat(latlngs);
    var glow = L.polyline(latlngs, {color:'#ffffff', weight:14, opacity:0.2, pane:'alignmentGlowPane'}).addTo(map);
    var bright = L.polyline(latlngs, {color:'#ff1744', weight:5, opacity:1.0, pane:'alignmentPane'}).addTo(map);
    alignmentLayers.push(glow);
    alignmentLayers.push(bright);
  });
  if (all.length)
    try { map.flyToBounds(L.latLngBounds(all), {padding:[30,30], duration:0.8}); } catch(e){}
}

/* ── Per-element coloured alignment (Step 5+ and after export) ── */
/*
 * segments  : [{type:"Line"|"Arc"|"Spiral", points:[[lat,lon],...], params:{...}}, ...]
 *
 * Each element drawn as a separate coloured polyline with a sticky HTML
 * tooltip listing its parameters.
 */
var ELEMENT_COLOR = {
  "Line":   "#42a5f5",
  "Arc":    "#ef5350",
  "Spiral": "#66bb6a"
};

function _fmtTooltip(seg) {
  var p = seg.params || {};
  var deg = function(rad) { return (rad * 180.0 / Math.PI).toFixed(2); };
  var num = function(v, n) { if (v === undefined || v === null) return "—"; return Number(v).toFixed(n === undefined ? 2 : n); };
  var staEnd = (p.sta_start || 0) + (p.length || 0);
  if (seg.type === "Line") {
    return "<b>Line</b><br>" +
           "Length: "      + num(p.length)         + " m<br>" +
           "Station: "     + num(p.sta_start)      + " → " + num(staEnd) + " m<br>" +
           "Direction: "   + (p.direction_rad !== undefined ? deg(p.direction_rad) + "°" : "—");
  } else if (seg.type === "Arc") {
    var defl = (p._deflection !== undefined) ? deg(p._deflection) : (p.deflection_deg !== undefined ? num(p.deflection_deg) : "—");
    return "<b>Arc</b><br>" +
           "Length: "      + num(p.length)         + " m<br>" +
           "Radius: "      + num(p.radius)         + " m<br>" +
           "Deflection: "  + defl                  + "°<br>" +
           "Rotation: "    + (p.rot || "—")        + "<br>" +
           "Station: "     + num(p.sta_start)      + " → " + num(staEnd) + " m";
  } else if (seg.type === "Spiral") {
    var rs = (p.radius_start === null || p.radius_start === undefined) ? "∞" : num(p.radius_start) + " m";
    var re = (p.radius_end   === null || p.radius_end   === undefined) ? "∞" : num(p.radius_end)   + " m";
    return "<b>Spiral (clothoid)</b><br>" +
           "Length: "      + num(p.length)         + " m<br>" +
           "Parameter A: " + num(p.clothoid_A)     + " m<br>" +
           "Radius: "      + rs + " → " + re        + "<br>" +
           "Rotation: "    + (p.rot || "—")        + "<br>" +
           "Station: "     + num(p.sta_start)      + " → " + num(staEnd) + " m";
  }
  return "<b>" + seg.type + "</b>";
}

function _fmtStatsPopup(seg) {
  var p = seg.params || {};
  var num = function(v, n) { if (v === undefined || v === null) return "—"; return Number(v).toFixed(n === undefined ? 2 : n); };
  var eid = p.element_id || "?";
  var staEnd = (p.sta_start || 0) + (p.length || 0);
  var html = "<b>" + eid + " · " + seg.type + "</b><br>" +
             "Length: "  + num(p.length)  + " m<br>" +
             "Station: " + num((p.sta_start||0)/1000, 3) + " → " + num(staEnd/1000, 3) + " km<br>";
  if (seg.type === "Arc") {
    html += "Radius: " + num(p.radius) + " m<br>";
    if (p._deflection !== undefined && p._deflection !== null)
      html += "Deflection: " + num(p._deflection * 180 / Math.PI) + "°<br>";
  }
  if (seg.type === "Spiral") {
    var rs = (p.radius_start === null || p.radius_start === undefined) ? "∞" : num(p.radius_start, 0);
    var re = (p.radius_end   === null || p.radius_end   === undefined) ? "∞" : num(p.radius_end, 0);
    html += "A: " + num(p.clothoid_A) + " m · R: " + rs + " → " + re + "<br>";
  }
  html += "<span style='color:#aaa'>Deviation vs OSM — max: " + num(p._max_dev) +
          " m · mean: " + num(p._mean_dev) + " m</span>";
  return html;
}

function _clearHover() {
  if (_hoverTimer) { clearTimeout(_hoverTimer); _hoverTimer = null; }
  if (_hoverPopup) { try { map.closePopup(_hoverPopup); } catch(e){} _hoverPopup = null; }
}

/* Glow layers are created ON DEMAND (hover / selection) instead of one per
   element: a 600-element alignment used to allocate 1 200 polylines up front. */
function _ensureGlow(entry) {
  if (!entry.glow) {
    entry.glow = L.polyline(entry.pts, {
      color: entry.col, weight: 13, opacity: 0.0,
      pane: 'alignmentGlowPane', renderer: _glowRenderer,
      interactive: false
    }).addTo(map);
    alignmentLayers.push(entry.glow);
  }
  return entry.glow;
}

function _emphasize(entry, on, weight) {
  if (on) {
    entry.main.setStyle({weight: weight || 7, opacity: 1.0});
    _ensureGlow(entry).setStyle({opacity: 0.5});
  } else {
    entry.main.setStyle({weight: 4, opacity: 0.95});
    if (entry.glow) entry.glow.setStyle({opacity: 0.0});
  }
}

function showAlignmentSegmented(segments, fitView) {
  if (fitView === undefined) fitView = true;
  clearAlignment();
  segIndex = {};
  var all = [];
  segments.forEach(function(seg) {
    var pts = (seg.points || []).map(function(n){ return [n[0], n[1]]; });
    if (pts.length < 2) return;
    all = all.concat(pts);
    var col = ELEMENT_COLOR[seg.type] || '#ffffff';
    /* Coloured main element (canvas-rendered: far cheaper for many paths) */
    var pl = L.polyline(pts, {
      color: col, weight: 4, opacity: 0.95,
      pane: 'alignmentPane', renderer: _alnRenderer
    }).addTo(map);
    pl.bindTooltip(_fmtTooltip(seg), {sticky: true, direction: 'top', className: 'aln-tip'});
    alignmentLayers.push(pl);

    var eid = (seg.params || {}).element_id;
    var entry = {main: pl, glow: null, pts: pts, col: col, selected: false};
    if (eid) segIndex[eid] = entry;

    /* Hover: immediate glow; after 3 s an ID + statistics popup.
       Selected elements keep their emphasized style on mouseout. */
    pl.on('mouseover', function(ev) {
      _emphasize(entry, true, 7);
      _clearHover();
      var at = ev.latlng;
      _hoverTimer = setTimeout(function() {
        _hoverPopup = L.popup({closeButton: false, className: 'aln-tip', autoPan: false})
          .setLatLng(at)
          .setContent(_fmtStatsPopup(seg))
          .openOn(map);
      }, 3000);
    });
    pl.on('mouseout', function() {
      if (entry.selected) _emphasize(entry, true, 8);
      else                _emphasize(entry, false);
      _clearHover();
    });

    /* Click: select this element in the table below.
       Ctrl+click toggles it into a multi-selection (for PI-range merge). */
    pl.on('click', function(ev) {
      L.DomEvent.stopPropagation(ev);
      if (_stationClickMode) {
        /* Station placement takes priority: forward the click instead */
        if (backend && backend.on_map_clicked)
          backend.on_map_clicked(ev.latlng.lat, ev.latlng.lng);
        return;
      }
      if (!eid) return;
      var ctrl = !!(ev.originalEvent &&
                    (ev.originalEvent.ctrlKey || ev.originalEvent.metaKey));
      if (backend && backend.on_element_clicked)
        backend.on_element_clicked(eid, ctrl);
    });
  });
  if (all.length && fitView)
    try { map.flyToBounds(L.latLngBounds(all), {padding:[30,30], duration:0.8}); } catch(e){}
}

/* Emphasize the selected elements (called from Python on every table
   selection change). Accepts an array of ids or a single id string. */
function highlightElements(elementIds) {
  if (typeof elementIds === 'string') elementIds = [elementIds];
  var wanted = {};
  (elementIds || []).forEach(function(id) { wanted[id] = true; });
  var firstSel = null;
  Object.keys(segIndex).forEach(function(k) {
    var e = segIndex[k];
    e.selected = !!wanted[k];
    _emphasize(e, e.selected, 8);   // creates the glow lazily, only if needed
    if (e.selected) {
      try { e.main.bringToFront(); } catch(err){}
      if (!firstSel) firstSel = e;
    }
  });
  if (firstSel) {
    try {
      var b = firstSel.main.getBounds();
      if (!map.getBounds().contains(b)) map.panTo(b.getCenter());
    } catch(e){}
  }
}

/* Backwards-compatible single-element variant */
function highlightElement(elementId) {
  highlightElements(elementId ? [elementId] : []);
}

/* ── PI overlay: markers + dashed virtual tangent extensions ───── */
function showPIOverlay(payload) {
  clearPIOverlay();
  if (!payload) return;
  (payload.tangents || []).forEach(function(t) {
    var pl = L.polyline([t.from, t.to], {
      color: '#9e9e9e', weight: 2, opacity: 0.55,
      dashArray: '6 6', pane: 'piPane'
    }).addTo(map);
    piLayers.push(pl);
  });
  (payload.pis || []).forEach(function(pi) {
    var omitted = !!pi.omitted;
    var mk = L.circleMarker(pi.latlon, {
      radius: 5,
      color:   omitted ? '#9e9e9e' : '#37474f',
      weight:  2,
      fillColor: omitted ? 'transparent' : '#ffffff',
      fillOpacity: omitted ? 0.0 : 0.9,
      pane: 'piPane'
    }).addTo(map);
    var d = (pi.defl_deg === undefined || pi.defl_deg === null)
            ? "" : " · δ=" + Number(pi.defl_deg).toFixed(1) + "°";
    mk.bindTooltip("PI " + pi.id + d + (omitted ? " (omitted)" : ""),
                   {direction: 'top', className: 'aln-tip'});
    piLayers.push(mk);
  });
}

function clearPIOverlay() {
  piLayers.forEach(function(l){ try{ map.removeLayer(l); }catch(e){} });
  piLayers = [];
}

/* ── Station markers + click-to-place mode ─────────────────────── */
function showStations(stations) {
  clearStations();
  (stations || []).forEach(function(s) {
    var mk = L.circleMarker(s.latlon, {
      radius: 7, color: '#4a148c', weight: 2,
      fillColor: '#ffd54f', fillOpacity: 0.95, pane: 'stationPane'
    }).addTo(map);
    mk.bindTooltip("🚉 " + (s.name || "?") +
                   " · km " + Number(s.km || 0).toFixed(3),
                   {direction: 'top', permanent: false, className: 'aln-tip'});
    stationLayers.push(mk);
  });
}

function clearStations() {
  stationLayers.forEach(function(l){ try{ map.removeLayer(l); }catch(e){} });
  stationLayers = [];
}

function setStationClickMode(on) {
  _stationClickMode = !!on;
  map.getContainer().style.cursor = on ? 'crosshair' : '';
}

map.on('click', function(ev) {
  if (_stationClickMode && backend && backend.on_map_clicked) {
    backend.on_map_clicked(ev.latlng.lat, ev.latlng.lng);
  }
});

/* ── Candidate emphasis (Step 4 card hover) ────────────────────── */
function emphasizeCandidate(algoId) {
  Object.keys(candIndex).forEach(function(k) {
    var pair = candIndex[k];
    if (!pair) return;
    pair[0].setStyle({opacity: 0.15});
    pair[1].setStyle({weight: 4, opacity: algoId ? 0.35 : 0.9});
  });
  if (algoId && candIndex[algoId]) {
    var sel = candIndex[algoId];
    sel[0].setStyle({opacity: 0.3});
    sel[1].setStyle({weight: 7, opacity: 1.0});
    sel[1].bringToFront();
  }
}

function flyToAlignment() {
  var all = [];
  alignmentLayers.forEach(function(l){ try{ all=all.concat(l.getLatLngs()); }catch(e){} });
  if (all.length)
    try { map.flyToBounds(L.latLngBounds(all), {padding:[30,30], duration:0.8}); } catch(e){}
}

function clearAlignment() {
  alignmentLayers.forEach(function(l){ try{ map.removeLayer(l); }catch(e){} });
  alignmentLayers = [];
  segIndex = {};
  _clearHover();
}

/* ── Candidate overlays (one per algorithm) ──────────────────── */
function showCandidates(candidates) {
  clearCandidates();
  candidates.forEach(function(c) {
    var latlngs = c.nodes.map(function(n){ return [n[0], n[1]]; });
    if (latlngs.length < 2) return;
    /* Glow */
    var glow = L.polyline(latlngs, {color:'#ffffff', weight:10, opacity:0.15,
                          pane:'candidatesPane'}).addTo(map);
    candidateLayers.push(glow);
    /* Main line */
    var pl = L.polyline(latlngs, {
      color:   c.color || '#ffffff',
      weight:  4,
      opacity: 0.9,
      pane:    'candidatesPane'
    }).addTo(map);
    pl.bindTooltip(c.label || '', {sticky: true});
    candidateLayers.push(pl);
    if (c.algo) candIndex[c.algo] = [glow, pl];
  });
}

function clearCandidates() {
  candidateLayers.forEach(function(l){
    try{ map.removeLayer(l); }catch(e){}
  });
  candidateLayers = [];
  candIndex = {};
}

/* ── Cross-section overlays (left / right, colour-coded) ──────── */
function showCrossSection(leftPts, rightPts) {
  clearCrossSection();
  function buildLayer(pts) {
    var layer = L.layerGroup();
    for (var i = 0; i < pts.length - 1; i++) {
      L.polyline(
        [[pts[i][0], pts[i][1]], [pts[i+1][0], pts[i+1][1]]],
        {color: pts[i][2], weight: 4, opacity: 0.85, pane: 'crossSectionPane'}
      ).addTo(layer);
    }
    return layer;
  }
  if (leftPts  && leftPts.length  > 0) csLeftLayer  = buildLayer(leftPts).addTo(map);
  if (rightPts && rightPts.length > 0) csRightLayer = buildLayer(rightPts).addTo(map);
}

function clearCrossSection() {
  if (csLeftLayer)  { try { map.removeLayer(csLeftLayer);  } catch(e) {} csLeftLayer  = null; }
  if (csRightLayer) { try { map.removeLayer(csRightLayer); } catch(e) {} csRightLayer = null; }
}

function clearAll() {
  showTracks([]);
  clearOSMReference();
  clearAlignment();
  clearCandidates();
  clearCrossSection();
  clearPIOverlay();
  clearStations();
}
</script>
</body>
</html>
